<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>車輛管家 V2.8 (自選色系版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <style>
    /* 核心配色定義 - 改用 data-theme 屬性控制 */
    :root { --bg: #f9fafb; --card: #ffffff; --text: #1f2937; --border: #f3f4f6; }
    
    /* 當 html 標籤帶有 data-theme="dark" 時套用深色 */
    html[data-theme="dark"] { 
      --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151; 
    }
    
    body { background-color: var(--bg); color: var(--text); touch-action: manipulation; transition: background-color 0.3s, color 0.3s; }
    .custom-card { background-color: var(--card); border: 1px solid var(--border); transition: background-color 0.3s, border-color 0.3s; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="font-sans overflow-x-hidden">

  <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6 relative">
    <button class="btn-theme-toggle absolute top-6 right-6 text-2xl opacity-60 hover:opacity-100 transition-opacity">🌓</button>
    
    <div class="custom-card p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
      <div class="text-6xl mb-4">🏎️</div>
      <h1 class="text-3xl font-black mb-2 text-blue-500">車輛管家</h1>
      <p class="opacity-50 mb-8 text-sm">點擊右上角自選深/淺色主題</p>
      <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center transition-all active:scale-95">
        Google 快速登入
      </button>
    </div>
  </div>

  <div id="app-screen" class="hidden min-h-screen flex flex-col pb-24">
    <header class="custom-card border-b sticky top-0 z-40 p-3 shadow-sm flex flex-col gap-2">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-1 flex-1 min-w-0">
          <select id="vehicle-select" class="font-bold text-lg bg-gray-500/10 border-none rounded-xl px-2 py-1.5 focus:ring-1 focus:ring-blue-400 truncate flex-1"></select>
          <button id="btn-edit-vehicle" class="p-2 opacity-40 hover:opacity-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
        </div>
        <div class="flex items-center gap-2 ml-2">
          <button class="btn-theme-toggle text-xl opacity-60 hover:opacity-100 p-1">🌓</button>
          <button id="btn-add-vehicle" class="bg-blue-500/10 text-blue-500 font-bold text-xs px-3 py-2 rounded-xl">新增</button>
          <button id="btn-logout" class="text-xs opacity-30 p-2">登出</button>
        </div>
      </div>
    </header>

    <main class="p-4 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="custom-card p-4 rounded-3xl shadow-sm">
          <div class="text-[10px] font-bold text-blue-500 uppercase">平均油耗</div>
          <div class="text-xl font-black mt-1"><span id="avg-fuel">--</span> <small class="text-[10px] opacity-40">km/L</small></div>
        </div>
        <div class="custom-card p-4 rounded-3xl shadow-sm">
          <div class="text-[10px] font-bold text-emerald-500 uppercase">總里程</div>
          <div class="text-xl font-black mt-1"><span id="total-dist">0</span> <small class="text-[10px] opacity-40">km</small></div>
        </div>
      </div>

      <div id="tab-record" class="tab-content block space-y-4">
        <div class="custom-card p-5 rounded-3xl shadow-sm">
          <h3 class="font-bold opacity-80 flex justify-between items-center mb-4 text-sm">
            <span>🛣️ 里程與計時</span>
            <button onclick="refreshData()" class="text-[10px] font-bold text-blue-500">刷新</button>
          </h3>
          <div id="mileage-ui-container"></div>
        </div>

        <div class="custom-card p-5 rounded-3xl shadow-sm">
          <h3 class="font-bold opacity-80 mb-4 text-sm">💰 紀錄花費</h3>
          <div class="flex flex-col gap-3">
            <div class="flex gap-2">
              <select id="exp-type" class="flex-1 p-4 bg-gray-500/5 rounded-2xl border-none font-bold outline-none">
                <option value="gas">⛽ 加油</option>
                <option value="maintain">🔧 保養</option>
                <option value="wash">🧼 洗車</option>
                <option value="repair">🛠️ 維修</option>
                <option value="other">📦 其他</option>
              </select>
              <input type="number" id="exp-amount" inputmode="numeric" placeholder="金額" class="w-1/3 p-4 bg-gray-500/5 rounded-2xl border-none font-bold outline-none">
            </div>
            <div id="gas-extra-input">
              <input type="number" id="exp-volume" step="0.01" inputmode="decimal" placeholder="公升數" class="w-full p-4 bg-blue-500/10 rounded-2xl border-none outline-none text-blue-500">
            </div>
            <button id="btn-save-exp" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold active:scale-95 transition-all">儲存花費</button>
          </div>
        </div>
      </div>

      <div id="tab-history" class="tab-content hidden">
        <div class="custom-card rounded-3xl shadow-sm overflow-hidden">
          <div class="p-3 border-b border-gray-500/10 flex flex-wrap gap-2">
            <button onclick="setHistoryFilter('all', this)" class="filter-btn px-4 py-1.5 rounded-xl text-xs font-bold bg-blue-600 text-white">全部</button>
            <button onclick="setHistoryFilter('trips', this)" class="filter-btn px-4 py-1.5 rounded-xl text-xs font-bold bg-gray-500/10 opacity-60">🛣️ 里程</button>
            <button onclick="setHistoryFilter('gas', this)" class="filter-btn px-4 py-1.5 rounded-xl text-xs font-bold bg-gray-500/10 opacity-60">⛽ 加油</button>
            <button onclick="setHistoryFilter('repair', this)" class="filter-btn px-4 py-1.5 rounded-xl text-xs font-bold bg-gray-500/10 opacity-60">🛠️ 維護</button>
          </div>
          <div id="history-list" class="divide-y divide-gray-500/10 overflow-y-auto max-h-[55vh] no-scrollbar"></div>
        </div>
      </div>
    </main>

    <nav class="custom-card fixed bottom-0 left-0 right-0 border-t flex justify-around p-3 pb-8 z-50">
      <button onclick="showTab('record')" id="nav-btn-record" class="flex flex-col items-center gap-1 text-blue-600 flex-1">
        <span class="text-xl">📝</span><span class="text-[10px] font-bold">紀錄</span>
      </button>
      <button onclick="showTab('history')" id="nav-btn-history" class="flex flex-col items-center gap-1 opacity-30 flex-1">
        <span class="text-xl">📊</span><span class="text-[10px] font-bold">歷史</span>
      </button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQW1T46x6GtcfK4xtQ3Z_O3uHyfCKUpd4",
      authDomain: "scooter-1330b.firebaseapp.com",
      projectId: "scooter-1330b",
      storageBucket: "scooter-1330b.firebasestorage.app",
      messagingSenderId: "259141255844",
      appId: "1:259141255844:web:3e0fb78235798f1a27dc31",
      measurementId: "G-5HKMW4VDYD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let user = null, vid = null, ongoingTrip = null, lastEndOdo = 0;
    let allHistoryItems = []; 
    let currentFilter = 'all';

    // === 新增：主題切換邏輯 ===
    document.querySelectorAll('.btn-theme-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', targetTheme);
        localStorage.setItem('theme', targetTheme); // 記憶使用者偏好
      });
    });

    // UI 切換欄位顯示：只有加油需要公升數
    const expType = document.getElementById('exp-type');
    const gasInput = document.getElementById('gas-extra-input');
    expType.onchange = (e) => {
      gasInput.style.display = e.target.value === 'gas' ? 'block' : 'none';
    };

    // 格式化日期與時間差
    const formatDate = (d) => `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const formatDur = (ms) => {
      const mins = Math.floor(ms / 60000);
      return mins >= 60 ? `${Math.floor(mins/60)}時${mins%60}分` : `${mins}分`;
    };

    onAuthStateChanged(auth, async (u) => {
      user = u;
      document.getElementById('login-screen').classList.toggle('hidden', !!u);
      document.getElementById('app-screen').classList.toggle('hidden', !u);
      if (u) await loadVehicles();
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    window.showTab = (tabId) => {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');
      document.getElementById('nav-btn-record').style.opacity = tabId === 'record' ? '1' : '0.3';
      document.getElementById('nav-btn-history').style.opacity = tabId === 'history' ? '1' : '0.3';
      if (tabId === 'history') loadHistory();
    };

    async function loadVehicles() {
      const q = query(collection(db, "vehicles"), where("userId", "==", user.uid));
      const snap = await getDocs(q);
      const select = document.getElementById('vehicle-select');
      select.innerHTML = snap.empty ? '<option value="">(無車輛)</option>' : '';
      snap.forEach(d => select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
      vid = select.value || null;
      refreshData();
    }

    document.getElementById('btn-add-vehicle').onclick = async () => {
      const name = prompt("車輛名稱：");
      if (name?.trim()) {
        await addDoc(collection(db, "vehicles"), { name: name.trim(), userId: user.uid, createdAt: serverTimestamp() });
        await loadVehicles();
      }
    };

    document.getElementById('btn-edit-vehicle').onclick = async () => {
      if (!vid) return;
      const select = document.getElementById('vehicle-select');
      const name = prompt("修改名稱：", select.options[select.selectedIndex].text);
      if (name?.trim()) {
        await updateDoc(doc(db, "vehicles", vid), { name: name.trim() });
        await loadVehicles();
      }
    };

    document.getElementById('vehicle-select').onchange = (e) => { vid = e.target.value; refreshData(); };

    window.refreshData = async () => {
      const container = document.getElementById('mileage-ui-container');
      if (!vid) { container.innerHTML = '<p class="text-center opacity-40 py-6 text-sm">請先新增車輛</p>'; return; }
      const q = query(collection(db, "trips"), where("vid", "==", vid));
      const snap = await getDocs(q);
      let trips = [];
      snap.forEach(d => trips.push({ id: d.id, ...d.data() }));
      ongoingTrip = trips.find(t => t.status === 'ongoing') || null;
      let completed = trips.filter(t => t.status === 'completed');
      lastEndOdo = completed.length > 0 ? Math.max(...completed.map(t => t.endOdo || 0)) : 0;
      renderMileageUI();
      calculateStats(trips);
    };

    function renderMileageUI() {
      const container = document.getElementById('mileage-ui-container');
      if (!ongoingTrip) {
        container.innerHTML = `
          <div class="space-y-3">
            <p class="text-[10px] font-bold opacity-40 uppercase">${lastEndOdo > 0 ? '上次迄點: ' + lastEndOdo : '輸入里程'}</p>
            <input type="number" id="odo-input" inputmode="numeric" value="${lastEndOdo > 0 ? lastEndOdo : ''}" class="w-full p-4 bg-gray-500/5 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-blue-500">
            <button id="btn-odo-action" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold active:scale-95 transition-all">🚩 紀錄出發 (起)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = startTrip;
      } else {
        const start = ongoingTrip.startTime?.toDate();
        container.innerHTML = `
          <div class="space-y-3">
            <div class="bg-blue-500/10 p-3 rounded-2xl flex justify-between items-center text-[11px] font-bold">
               <span class="text-blue-500">● 紀錄中</span>
               <span>起點 ${ongoingTrip.startOdo} km | ${start ? start.getHours()+':'+start.getMinutes().toString().padStart(2,'0') : ''}</span>
            </div>
            <input type="number" id="odo-input" inputmode="numeric" placeholder="迄點里程" class="w-full p-4 bg-gray-500/5 rounded-2xl text-2xl font-black outline-none border-2 border-emerald-500">
            <button id="btn-odo-action" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold active:scale-95 transition-all">🏁 紀錄抵達 (迄)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = endTrip;
      }
    }

    async function startTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo || (lastEndOdo > 0 && odo < lastEndOdo)) return alert("里程數錯誤");
      await addDoc(collection(db, "trips"), { vid, userId: user.uid, startOdo: odo, status: "ongoing", startTime: serverTimestamp() });
      refreshData();
    }

    async function endTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo || odo <= ongoingTrip.startOdo) return alert("里程數必須大於起點");
      const durationMs = new Date().getTime() - ongoingTrip.startTime.toDate().getTime();
      await updateDoc(doc(db, "trips", ongoingTrip.id), { endOdo: odo, distance: odo - ongoingTrip.startOdo, durationMs, status: "completed", endTime: serverTimestamp() });
      refreshData();
    }

    document.getElementById('btn-save-exp').onclick = async () => {
      const amount = Number(document.getElementById('exp-amount').value);
      const volume = Number(document.getElementById('exp-volume').value || 0);
      const type = expType.value;
      if (!vid || !amount) return alert("請輸入金額");
      await addDoc(collection(db, "expenses"), { vid, userId: user.uid, type, amount, volume, time: serverTimestamp() });
      document.getElementById('exp-amount').value = '';
      document.getElementById('exp-volume').value = '';
      alert("儲存完成");
      refreshData();
    };

    async function calculateStats(trips) {
      let d = 0; trips.filter(t => t.status === 'completed').forEach(t => d += (t.distance || 0));
      const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
      let v = 0; eSnap.forEach(d => { if(d.data().type === 'gas') v += (d.data().volume || 0); });
      document.getElementById('total-dist').innerText = d;
      document.getElementById('avg-fuel').innerText = v > 0 ? (d / v).toFixed(1) : "--";
    }

    window.loadHistory = async () => {
      if (!vid) return;
      const tSnap = await getDocs(query(collection(db, "trips"), where("vid", "==", vid)));
      const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
      allHistoryItems = [];
      tSnap.forEach(d => allHistoryItems.push({ id: d.id, db: 'trips', ...d.data(), date: d.data().startTime?.toDate() || new Date() }));
      eSnap.forEach(d => allHistoryItems.push({ id: d.id, db: 'expenses', ...d.data(), date: d.data().time?.toDate() || new Date() }));
      allHistoryItems.sort((a, b) => b.date - a.date);
      renderHistoryList();
    };

    window.setHistoryFilter = (f, btn) => {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => { b.classList.add('opacity-60'); b.classList.remove('bg-blue-600', 'text-white'); });
      btn.classList.remove('opacity-60'); btn.classList.add('bg-blue-600', 'text-white');
      renderHistoryList();
    };

    function renderHistoryList() {
      const list = document.getElementById('history-list');
      let filtered = allHistoryItems;
      if (currentFilter === 'trips') filtered = allHistoryItems.filter(i => i.db === 'trips');
      else if (currentFilter === 'gas') filtered = allHistoryItems.filter(i => i.db === 'expenses' && i.type === 'gas');
      else if (currentFilter === 'repair') filtered = allHistoryItems.filter(i => i.db === 'expenses' && i.type !== 'gas');
      
      if (filtered.length === 0) { list.innerHTML = `<p class="text-center py-10 opacity-30 text-sm">無資料</p>`; return; }

      list.innerHTML = filtered.map(i => {
        const timeStr = formatDate(i.date);
        const tMap = { gas: '⛽ 加油', maintain: '🔧 保養', wash: '🧼 洗車', repair: '🛠️ 維修', other: '📦 其他' };
        if (i.db === 'trips') {
          return `<div class="p-4 flex justify-between items-center">
            <div>
              <div class="text-[10px] opacity-30 font-bold">${timeStr} · 里程</div>
              <div class="text-lg font-black">${i.status === 'ongoing' ? '行駛中' : i.distance + ' km'}</div>
              <div class="text-[10px] opacity-40">${i.startOdo} ➜ ${i.endOdo || '?'} ${i.durationMs ? '⏱️ '+formatDur(i.durationMs) : ''}</div>
            </div>
            <button onclick="deleteItem('trips', '${i.id}')" class="text-[10px] bg-red-500/10 text-red-500 px-3 py-2 rounded-xl">刪除</button>
          </div>`;
        } else {
          return `<div class="p-4 flex justify-between items-center">
            <div>
              <div class="text-[10px] opacity-30 font-bold">${timeStr} · ${tMap[i.type]}</div>
              <div class="text-lg font-black text-blue-500">$${i.amount}</div>
              <div class="text-[10px] opacity-40">${i.volume ? i.volume + ' L' : ''}</div>
            </div>
            <button onclick="deleteItem('expenses', '${i.id}')" class="text-[10px] bg-red-500/10 text-red-500 px-3 py-2 rounded-xl">刪除</button>
          </div>`;
        }
      }).join('');
    }

    window.deleteItem = async (col, id) => { if (confirm("確定刪除？")) { await deleteDoc(doc(db, col, id)); loadHistory(); refreshData(); } };
  </script>
</body>
</html>
