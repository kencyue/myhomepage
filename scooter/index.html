<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>車輛管家 V2.6 (無捲軸優化版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 防止手機瀏覽器點擊縮放，並隱藏滾動條但保持滾動功能 */
    body { touch-action: manipulation; -webkit-overflow-scrolling: touch; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 確保所有元素都不會超出寬度 */
    * { box-sizing: border-box; max-width: 100%; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-x-hidden">

  <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border border-gray-100">
      <div class="text-5xl mb-4">🚗</div>
      <h1 class="text-3xl font-black mb-1 text-blue-600">車輛管家</h1>
      <p class="text-gray-400 mb-8 text-sm">里程與油耗追蹤系統</p>
      <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95">
        使用 Google 登入
      </button>
    </div>
  </div>

  <div id="app-screen" class="hidden min-h-screen flex flex-col pb-24">
    <header class="bg-white border-b sticky top-0 z-40 p-3 shadow-sm flex flex-col gap-2">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-1 flex-1 min-w-0">
          <select id="vehicle-select" class="font-bold text-lg bg-gray-100 border-none rounded-xl px-2 py-1.5 focus:ring-2 focus:ring-blue-100 truncate flex-1">
            <option value="">載入中...</option>
          </select>
          <button id="btn-edit-vehicle" class="p-2 text-gray-400 hover:text-blue-500" title="修改名稱">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
        </div>
        <div class="flex items-center gap-1 ml-2">
          <button id="btn-add-vehicle" class="bg-blue-50 text-blue-600 font-bold text-xs px-3 py-2 rounded-xl whitespace-nowrap">+ 新增車輛</button>
          <button id="btn-logout" class="text-xs text-gray-400 p-2">登出</button>
        </div>
      </div>
    </header>

    <main class="p-4 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm">
          <div class="text-[10px] font-bold text-blue-500 uppercase tracking-wider">平均油耗</div>
          <div class="text-xl font-black mt-1"><span id="avg-fuel">--</span> <small class="text-[10px] text-gray-400">km/L</small></div>
        </div>
        <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm">
          <div class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider">總里程</div>
          <div class="text-xl font-black mt-1"><span id="total-dist">0</span> <small class="text-[10px] text-gray-400">km</small></div>
        </div>
      </div>

      <div id="tab-record" class="tab-content block space-y-4">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-700 flex items-center gap-2"><span>🛣️</span> 里程紀錄</h3>
            <button onclick="refreshData()" class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-lg">刷新數據</button>
          </div>
          <div id="mileage-ui-container" class="space-y-3">
             <div class="animate-pulse bg-gray-50 h-24 rounded-2xl"></div>
          </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2"><span>💰</span> 花費紀錄</h3>
          <div class="flex flex-col gap-3">
            <div class="flex gap-2">
              <select id="exp-type" class="flex-1 p-4 bg-gray-50 rounded-2xl border-none text-base font-bold focus:ring-2 focus:ring-blue-100">
                <option value="gas">⛽ 加油</option>
                <option value="maintain">🔧 保養</option>
                <option value="wash">🧼 洗車</option>
                <option value="repair">🛠️ 維修</option>
              </select>
              <input type="number" id="exp-amount" inputmode="numeric" placeholder="金額" class="w-1/3 p-4 bg-gray-50 rounded-2xl border-none text-base font-bold focus:ring-2 focus:ring-blue-100">
            </div>
            <div id="gas-extra-input" class="transition-all duration-300">
              <input type="number" id="exp-volume" step="0.01" inputmode="decimal" placeholder="公升數 (用於計算油耗)" class="w-full p-4 bg-blue-50 rounded-2xl border-none text-base focus:ring-2 focus:ring-blue-100">
            </div>
            <button id="btn-save-exp" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold shadow-md active:scale-95 transition-transform">儲存紀錄</button>
          </div>
        </div>
      </div>

      <div id="tab-history" class="tab-content hidden h-full">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
          <div class="p-4 bg-gray-50/50 flex justify-between items-center border-b">
            <span class="font-bold text-gray-600">歷史明細</span>
            <button onclick="loadHistory()" class="text-xs text-blue-500 font-bold">同步雲端</button>
          </div>
          
          <div class="p-3 border-b flex flex-wrap gap-2 bg-white">
            <button onclick="setHistoryFilter('all', this)" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-blue-600 text-white">全部</button>
            <button onclick="setHistoryFilter('trips', this)" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">🛣️ 里程</button>
            <button onclick="setHistoryFilter('gas', this)" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">⛽ 加油</button>
            <button onclick="setHistoryFilter('other', this)" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">🔧 其它</button>
          </div>

          <div id="history-list" class="divide-y overflow-y-auto max-h-[50vh] no-scrollbar">
            <div class="p-10 text-center text-gray-300 italic">載入中...</div>
          </div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t flex justify-around p-3 pb-8 z-50">
      <button onclick="showTab('record')" id="nav-btn-record" class="flex flex-col items-center gap-1 text-blue-600 flex-1">
        <span class="text-xl">📝</span><span class="text-[10px] font-bold">快速紀錄</span>
      </button>
      <button onclick="showTab('history')" id="nav-btn-history" class="flex flex-col items-center gap-1 text-gray-300 flex-1">
        <span class="text-xl">📊</span><span class="text-[10px] font-bold">歷史明細</span>
      </button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQW1T46x6GtcfK4xtQ3Z_O3uHyfCKUpd4",
      authDomain: "scooter-1330b.firebaseapp.com",
      projectId: "scooter-1330b",
      storageBucket: "scooter-1330b.firebasestorage.app",
      messagingSenderId: "259141255844",
      appId: "1:259141255844:web:3e0fb78235798f1a27dc31",
      measurementId: "G-5HKMW4VDYD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let user = null, vid = null, ongoingTrip = null, lastEndOdo = 0;
    let allHistoryItems = []; 
    let currentFilter = 'all';

    onAuthStateChanged(auth, async (u) => {
      user = u;
      document.getElementById('login-screen').classList.toggle('hidden', !!u);
      document.getElementById('app-screen').classList.toggle('hidden', !u);
      if (u) await loadVehicles();
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    window.showTab = (tabId) => {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');
      document.getElementById('nav-btn-record').className = tabId === 'record' ? 'flex flex-col items-center gap-1 text-blue-600 flex-1' : 'flex flex-col items-center gap-1 text-gray-300 flex-1';
      document.getElementById('nav-btn-history').className = tabId === 'history' ? 'flex flex-col items-center gap-1 text-blue-600 flex-1' : 'flex flex-col items-center gap-1 text-gray-300 flex-1';
      if (tabId === 'history') loadHistory();
    };

    const expTypeSelect = document.getElementById('exp-type');
    const gasExtraInput = document.getElementById('gas-extra-input');
    
    expTypeSelect.addEventListener('change', (e) => {
      gasExtraInput.style.display = e.target.value === 'gas' ? 'block' : 'none';
    });

    async function loadVehicles() {
      try {
        const q = query(collection(db, "vehicles"), where("userId", "==", user.uid));
        const snap = await getDocs(q);
        const select = document.getElementById('vehicle-select');
        
        if (snap.empty) {
          select.innerHTML = '<option value="">(無車輛)</option>';
          vid = null;
        } else {
          select.innerHTML = '';
          snap.forEach(d => select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
          vid = select.value;
        }
        refreshData();
      } catch (e) {
        console.error(e);
      }
    }

    // 新增車輛
    document.getElementById('btn-add-vehicle').onclick = async () => {
      const name = prompt("請輸入新車輛名稱：");
      if (name && name.trim()) {
        await addDoc(collection(db, "vehicles"), { name: name.trim(), userId: user.uid, createdAt: serverTimestamp() });
        await loadVehicles();
      }
    };

    // 修改車輛名稱
    document.getElementById('btn-edit-vehicle').onclick = async () => {
      if (!vid) return;
      const select = document.getElementById('vehicle-select');
      const currentName = select.options[select.selectedIndex].text;
      const newName = prompt("請輸入車輛新名稱：", currentName);
      if (newName && newName.trim() && newName !== currentName) {
        try {
          await updateDoc(doc(db, "vehicles", vid), { name: newName.trim() });
          await loadVehicles();
          alert("名稱修改成功！");
        } catch (e) { alert("修改失敗：" + e.message); }
      }
    };

    document.getElementById('vehicle-select').onchange = (e) => {
      vid = e.target.value;
      refreshData();
    };

    window.refreshData = async () => {
      const container = document.getElementById('mileage-ui-container');
      if (!vid) {
        container.innerHTML = '<div class="p-6 text-center text-gray-400 bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-sm">請點擊上方「新增車輛」開始</div>';
        return;
      }
      container.innerHTML = '<div class="p-6 text-center text-blue-500 font-bold animate-pulse text-sm">同步雲端...</div>';
      try {
        const q = query(collection(db, "trips"), where("vid", "==", vid));
        const snap = await getDocs(q);
        let trips = [];
        snap.forEach(d => trips.push({ id: d.id, ...d.data() }));
        ongoingTrip = trips.find(t => t.status === 'ongoing') || null;
        let completedTrips = trips.filter(t => t.status === 'completed');
        lastEndOdo = completedTrips.length > 0 ? Math.max(...completedTrips.map(t => t.endOdo || 0)) : 0;
        renderMileageUI();
        calculateStats(trips);
      } catch (e) { console.error(e); }
    };

    function renderMileageUI() {
      const container = document.getElementById('mileage-ui-container');
      if (!ongoingTrip) {
        container.innerHTML = `
          <div class="space-y-3">
            <p class="text-[11px] font-bold text-gray-400 uppercase">${lastEndOdo > 0 ? '自動填入上次迄點' : '請輸入出發里程'}</p>
            <input type="number" id="odo-input" inputmode="numeric" value="${lastEndOdo > 0 ? lastEndOdo : ''}" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-blue-200 text-2xl font-black text-blue-600 outline-none">
            <button id="btn-odo-action" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-transform">🚩 紀錄出發 (起)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = startTrip;
      } else {
        container.innerHTML = `
          <div class="space-y-3">
            <div class="bg-orange-50 p-3 rounded-2xl flex justify-between items-center text-xs">
               <span class="text-orange-600 font-bold">● 行駛中</span>
               <span class="text-gray-500">起點: ${ongoingTrip.startOdo} km</span>
            </div>
            <input type="number" id="odo-input" inputmode="numeric" placeholder="迄點里程" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-emerald-200 text-2xl font-black text-emerald-600 outline-none">
            <button id="btn-odo-action" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-100 active:scale-95 transition-transform">🏁 紀錄抵達 (迄)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = endTrip;
      }
    }

    async function startTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo) return alert("請輸入里程");
      if (lastEndOdo > 0 && odo < lastEndOdo) return alert("出發里程不能小於上次抵達里程！");
      await addDoc(collection(db, "trips"), { vid, userId: user.uid, startOdo: odo, status: "ongoing", startTime: serverTimestamp() });
      refreshData();
    }

    async function endTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo || odo <= ongoingTrip.startOdo) return alert("迄點必須大於起點！");
      await updateDoc(doc(db, "trips", ongoingTrip.id), { endOdo: odo, distance: odo - ongoingTrip.startOdo, status: "completed", endTime: serverTimestamp() });
      refreshData();
    }

    document.getElementById('btn-save-exp').onclick = async () => {
      const amount = Number(document.getElementById('exp-amount').value);
      const volume = Number(document.getElementById('exp-volume').value || 0);
      const type = document.getElementById('exp-type').value;
      if (!vid || !amount) return alert("請輸入完整花費資訊");
      await addDoc(collection(db, "expenses"), { vid, userId: user.uid, type, amount, volume, time: serverTimestamp() });
      document.getElementById('exp-amount').value = '';
      document.getElementById('exp-volume').value = '';
      alert("儲存成功");
      refreshData();
    };

    async function calculateStats(trips) {
      let totalDist = 0;
      trips.filter(t => t.status === 'completed').forEach(t => totalDist += (t.distance || 0));
      const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
      let totalVol = 0;
      eSnap.forEach(d => { if(d.data().type === 'gas') totalVol += (d.data().volume || 0); });
      document.getElementById('total-dist').innerText = totalDist;
      document.getElementById('avg-fuel').innerText = totalVol > 0 ? (totalDist / totalVol).toFixed(1) : "--";
    }

    window.loadHistory = async () => {
      if (!vid) return;
      const list = document.getElementById('history-list');
      try {
        const tSnap = await getDocs(query(collection(db, "trips"), where("vid", "==", vid)));
        const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
        allHistoryItems = [];
        tSnap.forEach(d => { allHistoryItems.push({ id: d.id, db: 'trips', ...d.data(), date: d.data().startTime?.toDate() || new Date() }); });
        eSnap.forEach(d => { allHistoryItems.push({ id: d.id, db: 'expenses', ...d.data(), date: d.data().time?.toDate() || new Date() }); });
        allHistoryItems.sort((a, b) => b.date - a.date);
        renderHistoryList();
      } catch (e) { console.error(e); }
    };

    window.setHistoryFilter = (filter, btn) => {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => { b.className = "filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-gray-100 text-gray-500"; });
      btn.className = "filter-btn px-3 py-1.5 rounded-xl text-xs font-bold bg-blue-600 text-white";
      renderHistoryList();
    };

    function renderHistoryList() {
      const list = document.getElementById('history-list');
      let filtered = allHistoryItems;
      if (currentFilter === 'trips') filtered = allHistoryItems.filter(i => i.db === 'trips');
      else if (currentFilter === 'gas') filtered = allHistoryItems.filter(i => i.db === 'expenses' && i.type === 'gas');
      else if (currentFilter === 'other') filtered = allHistoryItems.filter(i => i.db === 'expenses' && i.type !== 'gas');

      if (filtered.length === 0) { list.innerHTML = `<div class="p-10 text-center text-gray-300 text-sm italic">無紀錄</div>`; return; }

      list.innerHTML = filtered.map(item => {
        const d = item.date;
        const timeStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        if (item.db === 'trips') {
          return `<div class="p-4 flex justify-between items-center">
            <div class="min-w-0 pr-2">
              <div class="text-[10px] font-bold text-gray-300 uppercase">${timeStr}</div>
              <div class="text-lg font-black ${item.status==='ongoing'?'text-orange-400':'text-gray-800'}">${item.status === 'ongoing' ? '行駛中' : item.distance + ' km'}</div>
              <div class="text-[10px] text-gray-400 truncate">${item.startOdo} ➜ ${item.endOdo || '?'}</div>
            </div>
            <button onclick="deleteItem('trips', '${item.id}')" class="text-xs bg-red-50 text-red-400 px-3 py-1 rounded-lg">刪除</button>
          </div>`;
        } else {
          const typeMap = { gas: '⛽ 加油', maintain: '🔧 保養', wash: '🧼 洗車', repair: '🛠️ 維修' };
          return `<div class="p-4 flex justify-between items-center">
            <div class="min-w-0 pr-2">
              <div class="text-[10px] font-bold text-gray-300 uppercase">${timeStr}</div>
              <div class="text-lg font-black text-blue-500">${typeMap[item.type] || '其他'}：$${item.amount}</div>
              ${item.volume ? `<div class="text-[10px] text-gray-400">${item.volume} 公升</div>` : ''}
            </div>
            <button onclick="deleteItem('expenses', '${item.id}')" class="text-xs bg-red-50 text-red-400 px-3 py-1 rounded-lg">刪除</button>
          </div>`;
        }
      }).join('');
    }

    window.deleteItem = async (col, id) => {
      if (confirm("確定刪除？")) {
        await deleteDoc(doc(db, col, id));
        loadHistory(); refreshData();
      }
    };
  </script>
</body>
</html>
