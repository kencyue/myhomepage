<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>車輛管家 V2.4 (加入年份顯示版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center border">
      <h1 class="text-3xl font-black mb-2 text-blue-600">車輛管家</h1>
      <p class="text-gray-400 mb-8">里程與花費雲端紀錄</p>
      <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
        使用 Google 帳號登入
      </button>
    </div>
  </div>

  <div id="app-screen" class="hidden min-h-screen flex flex-col pb-24">
    <header class="bg-white border-b sticky top-0 z-30 p-4 shadow-sm flex justify-between items-center">
      <div class="flex items-center gap-2">
        <select id="vehicle-select" class="font-bold text-lg bg-gray-100 border-none rounded-lg px-2 py-1">
          <option value="">載入中...</option>
        </select>
        <button id="btn-add-vehicle" class="text-blue-600 font-bold text-sm bg-blue-50 px-3 py-1 rounded-full">+ 新增</button>
      </div>
      <button id="btn-logout" class="text-xs text-gray-400">登出</button>
    </header>

    <main class="p-4 space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-gradient-to-br from-blue-500 to-blue-600 p-4 rounded-2xl text-white shadow-lg">
          <div class="text-xs opacity-70">平均油耗</div>
          <div class="text-2xl font-black mt-1"><span id="avg-fuel">--</span> <small class="text-xs font-normal">km/L</small></div>
        </div>
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 p-4 rounded-2xl text-white shadow-lg">
          <div class="text-xs opacity-70">總里程</div>
          <div class="text-2xl font-black mt-1"><span id="total-dist">0</span> <small class="text-xs font-normal">km</small></div>
        </div>
      </div>

      <div id="tab-record" class="tab-content block space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold">🛣️ 里程紀錄</h3>
            <button onclick="refreshData()" class="text-xs text-blue-500 bg-blue-50 px-2 py-1 rounded">🔄 刷新</button>
          </div>
          <div id="mileage-ui-container" class="space-y-3">
             <div class="animate-pulse bg-gray-100 h-20 rounded-xl"></div>
          </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
          <h3 class="font-bold mb-4">💰 紀錄花費</h3>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <select id="exp-type" class="p-4 bg-gray-50 rounded-xl border-none text-base font-bold text-gray-700 focus:ring-2 focus:ring-blue-200 outline-none">
              <option value="gas">⛽ 加油</option>
              <option value="maintain">🔧 保養</option>
              <option value="wash">🧼 洗車</option>
              <option value="repair">🛠️ 維修</option>
            </select>
            <input type="number" id="exp-amount" inputmode="numeric" placeholder="總金額" class="p-4 bg-gray-50 rounded-xl border-none text-base font-bold focus:ring-2 focus:ring-blue-200 outline-none">
          </div>
          <div id="gas-extra-input" class="mb-4 transition-all duration-300">
            <input type="number" id="exp-volume" step="0.01" inputmode="decimal" placeholder="加油公升數 (計算油耗用)" class="w-full p-4 bg-blue-50 rounded-xl border-none text-base focus:ring-2 focus:ring-blue-300 outline-none">
          </div>
          <button id="btn-save-exp" class="w-full py-4 bg-gray-800 text-white rounded-xl font-bold shadow-lg">儲存花費</button>
        </div>
      </div>

      <div id="tab-history" class="tab-content hidden space-y-4">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border">
          <div class="p-4 border-b font-bold bg-gray-50 flex justify-between items-center">
            <span>歷史明細</span>
            <button onclick="loadHistory()" class="text-xs text-blue-500">🔄 整理</button>
          </div>
          
          <div class="p-3 border-b flex gap-2 overflow-x-auto whitespace-nowrap bg-white sticky top-0">
            <button onclick="setHistoryFilter('all', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-blue-600 text-white shadow-md transition-all">全部</button>
            <button onclick="setHistoryFilter('trips', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all">🛣️ 里程</button>
            <button onclick="setHistoryFilter('gas', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all">⛽ 加油</button>
            <button onclick="setHistoryFilter('other', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all">🔧 保養與其他</button>
          </div>

          <div id="history-list" class="divide-y max-h-[60vh] overflow-y-auto bg-gray-50/50">
            <div class="p-10 text-center text-gray-400">尚無資料</div>
          </div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-3 pb-8 z-40 shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)]">
      <button onclick="showTab('record')" id="nav-btn-record" class="flex flex-col items-center gap-1 text-blue-600">
        <span class="text-2xl">📝</span><span class="text-xs font-bold">快速紀錄</span>
      </button>
      <button onclick="showTab('history')" id="nav-btn-history" class="flex flex-col items-center gap-1 text-gray-400">
        <span class="text-2xl">📊</span><span class="text-xs font-bold">歷史明細</span>
      </button>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQW1T46x6GtcfK4xtQ3Z_O3uHyfCKUpd4",
      authDomain: "scooter-1330b.firebaseapp.com",
      projectId: "scooter-1330b",
      storageBucket: "scooter-1330b.firebasestorage.app",
      messagingSenderId: "259141255844",
      appId: "1:259141255844:web:3e0fb78235798f1a27dc31",
      measurementId: "G-5HKMW4VDYD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let user = null, vid = null, ongoingTrip = null;
    let allHistoryItems = []; 
    let currentFilter = 'all';

    onAuthStateChanged(auth, async (u) => {
      user = u;
      document.getElementById('login-screen').classList.toggle('hidden', !!u);
      document.getElementById('app-screen').classList.toggle('hidden', !u);
      if (u) await loadVehicles();
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    window.showTab = (tabId) => {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');
      
      document.getElementById('nav-btn-record').className = tabId === 'record' ? 'flex flex-col items-center gap-1 text-blue-600' : 'flex flex-col items-center gap-1 text-gray-400';
      document.getElementById('nav-btn-history').className = tabId === 'history' ? 'flex flex-col items-center gap-1 text-blue-600' : 'flex flex-col items-center gap-1 text-gray-400';
      
      if (tabId === 'history') loadHistory();
    };

    const expTypeSelect = document.getElementById('exp-type');
    const gasExtraInput = document.getElementById('gas-extra-input');
    const expVolumeInput = document.getElementById('exp-volume');
    
    expTypeSelect.addEventListener('change', (e) => {
      if (e.target.value === 'gas') {
        gasExtraInput.classList.remove('hidden');
      } else {
        gasExtraInput.classList.add('hidden');
        expVolumeInput.value = ''; 
      }
    });

    async function loadVehicles() {
      try {
        const q = query(collection(db, "vehicles"), where("userId", "==", user.uid));
        const snap = await getDocs(q);
        const select = document.getElementById('vehicle-select');
        
        if (snap.empty) {
          select.innerHTML = '<option value="">(請先新增車輛)</option>';
          vid = null;
        } else {
          select.innerHTML = '';
          snap.forEach(d => select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
          vid = select.value;
        }
        refreshData();
      } catch (e) {
        alert("載入車輛失敗: " + e.message);
      }
    }

    document.getElementById('btn-add-vehicle').onclick = async () => {
      const name = prompt("請輸入車輛名稱 (例如：我的機車):");
      if (name) {
        await addDoc(collection(db, "vehicles"), { name, userId: user.uid, createdAt: serverTimestamp() });
        await loadVehicles();
      }
    };

    document.getElementById('vehicle-select').onchange = (e) => {
      vid = e.target.value;
      refreshData();
    };

    window.refreshData = async () => {
      const container = document.getElementById('mileage-ui-container');
      if (!vid) {
        container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-gray-50 rounded-xl border border-dashed border-gray-300">👉 請先點擊上方「+ 新增」車輛</div>';
        document.getElementById('total-dist').innerText = "0";
        document.getElementById('avg-fuel').innerText = "--";
        return;
      }

      container.innerHTML = '<div class="p-6 text-center text-blue-500 font-bold animate-pulse">正在同步雲端資料...</div>';

      try {
        const q = query(collection(db, "trips"), where("vid", "==", vid));
        const snap = await getDocs(q);
        let trips = [];
        snap.forEach(d => trips.push({ id: d.id, ...d.data() }));

        ongoingTrip = trips.find(t => t.status === 'ongoing') || null;
        renderMileageUI();
        calculateStats(trips);
      } catch (e) {
        container.innerHTML = `<div class="p-4 text-red-500 bg-red-50 rounded-lg text-sm">讀取失敗: ${e.message}</div>`;
      }
    };

    function renderMileageUI() {
      const container = document.getElementById('mileage-ui-container');
      if (!ongoingTrip) {
        container.innerHTML = `
          <div class="space-y-3">
            <p class="text-sm text-gray-500 font-medium">✨ 準備出發？請輸入目前儀表板里程：</p>
            <input type="number" id="odo-input" inputmode="numeric" placeholder="例如: 15200" class="w-full p-4 bg-blue-50 rounded-xl border border-blue-200 text-2xl font-black text-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="btn-odo-action" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg active:scale-95 transition-transform text-lg">🚩 紀錄出發里程 (起)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = startTrip;
      } else {
        container.innerHTML = `
          <div class="space-y-3">
            <div class="bg-orange-50 p-4 rounded-xl border border-orange-200 flex justify-between items-center shadow-inner">
               <div class="flex items-center gap-2">
                 <span class="animate-pulse w-3 h-3 bg-orange-500 rounded-full"></span>
                 <span class="text-orange-700 font-bold">行駛紀錄中...</span>
               </div>
               <span class="text-sm text-orange-600 bg-orange-100 px-2 py-1 rounded">起點: ${ongoingTrip.startOdo} km</span>
            </div>
            <p class="text-sm text-gray-500 font-medium mt-2">抵達目的地！請輸入最新儀表板里程：</p>
            <input type="number" id="odo-input" inputmode="numeric" placeholder="例如: 15235" class="w-full p-4 bg-emerald-50 rounded-xl border border-emerald-200 text-2xl font-black text-emerald-800 focus:outline-none focus:ring-2 focus:ring-emerald-400">
            <button id="btn-odo-action" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg active:scale-95 transition-transform text-lg">🏁 紀錄抵達里程 (迄)</button>
          </div>
        `;
        document.getElementById('btn-odo-action').onclick = endTrip;
      }
    }

    async function startTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo) return alert("請輸入出發里程數！");
      document.getElementById('btn-odo-action').innerText = "儲存中...";
      document.getElementById('btn-odo-action').disabled = true;

      await addDoc(collection(db, "trips"), {
        vid, userId: user.uid, startOdo: odo, status: "ongoing", startTime: serverTimestamp()
      });
      refreshData();
    }

    async function endTrip() {
      const odo = Number(document.getElementById('odo-input').value);
      if (!odo) return alert("請輸入抵達里程數！");
      if (odo <= ongoingTrip.startOdo) return alert(`抵達里程必須大於出發里程 (${ongoingTrip.startOdo}) 喔！`);
      
      document.getElementById('btn-odo-action').innerText = "計算中...";
      document.getElementById('btn-odo-action').disabled = true;

      await updateDoc(doc(db, "trips", ongoingTrip.id), {
        endOdo: odo,
        distance: odo - ongoingTrip.startOdo,
        status: "completed",
        endTime: serverTimestamp()
      });
      alert(`已成功紀錄！本次行駛了 ${odo - ongoingTrip.startOdo} 公里`);
      refreshData();
    }

    document.getElementById('btn-save-exp').onclick = async () => {
      const amount = Number(document.getElementById('exp-amount').value);
      const volume = Number(expVolumeInput.value || 0);
      const type = expTypeSelect.value;
      
      if (!vid) return alert("請先新增並選擇車輛");
      if (!amount) return alert("請輸入花費金額");
      if (type === 'gas' && !volume) return alert("加油請輸入公升數以計算精準油耗喔！");

      const btn = document.getElementById('btn-save-exp');
      btn.innerText = "寫入雲端中...";
      btn.disabled = true;
      
      await addDoc(collection(db, "expenses"), {
        vid, userId: user.uid, type, amount, volume, time: serverTimestamp()
      });
      
      document.getElementById('exp-amount').value = '';
      expVolumeInput.value = '';
      btn.innerText = "儲存花費";
      btn.disabled = false;
      
      alert("帳目儲存成功！");
      refreshData();
    };

    async function calculateStats(trips) {
      if(!vid) return;
      let totalDist = 0;
      trips.filter(t => t.status === 'completed').forEach(t => totalDist += (t.distance || 0));

      const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
      let totalVol = 0;
      eSnap.forEach(d => {
        if(d.data().type === 'gas') totalVol += (d.data().volume || 0);
      });

      document.getElementById('total-dist').innerText = totalDist;
      document.getElementById('avg-fuel').innerText = totalVol > 0 ? (totalDist / totalVol).toFixed(1) : "--";
    }

    window.loadHistory = async () => {
      if (!vid) return;
      const list = document.getElementById('history-list');
      list.innerHTML = '<div class="p-10 text-center text-blue-500 font-bold animate-pulse">讀取明細中...</div>';
      
      try {
        const tSnap = await getDocs(query(collection(db, "trips"), where("vid", "==", vid)));
        const eSnap = await getDocs(query(collection(db, "expenses"), where("vid", "==", vid)));
        
        allHistoryItems = [];
        tSnap.forEach(d => {
           const dateObj = d.data().startTime?.toDate() || new Date(); 
           allHistoryItems.push({ id: d.id, db: 'trips', ...d.data(), date: dateObj });
        });
        eSnap.forEach(d => {
           const dateObj = d.data().time?.toDate() || new Date();
           allHistoryItems.push({ id: d.id, db: 'expenses', ...d.data(), date: dateObj });
        });
        
        allHistoryItems.sort((a, b) => b.date - a.date);
        renderHistoryList();
      } catch (e) {
        list.innerHTML = `<div class="p-4 text-red-500 text-sm">歷史紀錄讀取失敗: ${e.message}</div>`;
      }
    };

    window.setHistoryFilter = (filter, btnElement) => {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = "filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all";
      });
      btnElement.className = "filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-blue-600 text-white shadow-md transition-all";
      renderHistoryList();
    };

    function renderHistoryList() {
      const list = document.getElementById('history-list');
      let filteredItems = allHistoryItems;
      if (currentFilter === 'trips') {
        filteredItems = allHistoryItems.filter(i => i.db === 'trips');
      } else if (currentFilter === 'gas') {
        filteredItems = allHistoryItems.filter(i => i.db === 'expenses' && i.type === 'gas');
      } else if (currentFilter === 'other') {
        filteredItems = allHistoryItems.filter(i => i.db === 'expenses' && i.type !== 'gas');
      }

      if (filteredItems.length === 0) {
        list.innerHTML = `<div class="p-12 text-center text-gray-400 italic">這個分類目前沒有紀錄喔</div>`;
        return;
      }

      list.innerHTML = filteredItems.map(item => {
        // --- ★ 這裡就是加上年份與補零的地方 ★ ---
        const yyyy = item.date.getFullYear();
        const mm = String(item.date.getMonth() + 1).padStart(2, '0');
        const dd = String(item.date.getDate()).padStart(2, '0');
        const hh = String(item.date.getHours()).padStart(2, '0');
        const min = String(item.date.getMinutes()).padStart(2, '0');
        const timeStr = `${yyyy}/${mm}/${dd} ${hh}:${min}`;
        
        if (item.db === 'trips') {
          return `
            <div class="p-4 flex justify-between items-center bg-white hover:bg-gray-50 transition-colors">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded uppercase font-bold">🛣️ 里程</span>
                  <span class="text-xs text-gray-400">${timeStr}</span>
                </div>
                <div class="text-xl font-black ${item.status==='ongoing'?'text-orange-500':'text-gray-800'}">
                  ${item.status === 'ongoing' ? '行程未結束' : item.distance + ' km'}
                </div>
                <div class="text-xs text-gray-400 mt-1">${item.startOdo} <span class="text-blue-300">➜</span> ${item.endOdo || '?'}</div>
              </div>
              <button onclick="deleteItem('trips', '${item.id}')" class="text-gray-400 bg-white border border-gray-200 px-3 py-2 rounded-xl shadow-sm hover:text-red-500 hover:border-red-200 transition-all text-sm">刪除</button>
            </div>
          `;
        } else {
          const typeMap = { gas: '⛽ 加油', maintain: '🔧 保養', wash: '🧼 洗車', repair: '🛠️ 維修' };
          const isGas = item.type === 'gas';
          return `
            <div class="p-4 flex justify-between items-center bg-white hover:bg-gray-50 transition-colors">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-[10px] ${isGas ? 'bg-blue-100 text-blue-600' : 'bg-orange-100 text-orange-600'} px-2 py-0.5 rounded uppercase font-bold">${typeMap[item.type]||'其他'}</span>
                  <span class="text-xs text-gray-400">${timeStr}</span>
                </div>
                <div class="text-xl font-black ${isGas ? 'text-blue-600' : 'text-orange-600'}">
                  $ ${item.amount}
                </div>
                ${item.volume ? `<div class="text-xs text-gray-500 mt-1 font-medium">加了 ${item.volume} 公升</div>` : ''}
              </div>
              <button onclick="deleteItem('expenses', '${item.id}')" class="text-gray-400 bg-white border border-gray-200 px-3 py-2 rounded-xl shadow-sm hover:text-red-500 hover:border-red-200 transition-all text-sm">刪除</button>
            </div>
          `;
        }
      }).join('');
    }

    window.deleteItem = async (col, id) => {
      if (confirm("確定要刪除這筆資料嗎？(油耗與里程會重新計算)")) {
        await deleteDoc(doc(db, col, id));
        if(col === 'trips' && ongoingTrip && ongoingTrip.id === id) ongoingTrip = null; 
        loadHistory();
        refreshData();
      }
    };
  </script>
</body>
</html>
